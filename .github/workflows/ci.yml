name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libeigen3-dev \
            libsfml-dev \
            libx11-dev \
            doxygen \
            graphviz

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: cmake --build build --target check

  format:
    name: Formatting (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find 3DRenderer -name "*.cpp" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror

  lint:
    name: Lint (clang-tidy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            libeigen3-dev \
            libsfml-dev \
            libx11-dev \
            doxygen

      - name: Configure
        run: cmake -B build

      - name: Run clang-tidy
        run: |
          find 3DRenderer -name "*.cpp" | \
          xargs clang-tidy -p build/ --warnings-as-errors='*'

  docs:
    name: Documentation (Doxygen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Configure
        run: cmake -B build

      - name: Build documentation
        run: cmake --build build --target docs
